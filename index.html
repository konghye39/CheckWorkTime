function sbFetch(path, { method = "GET", body, token } = {}) {
  const h = { apikey: SB_KEY, "Content-Type": "application/json",
    Prefer: method === "POST" ? "resolution=merge-duplicates,return=representation" : "return=representation" };
  if (token) h.Authorization = "Bearer " + token;
  return fetch(SB_URL + path, { method, headers: h, body: body ? JSON.stringify(body) : undefined })
    .then(async r => { const d = await r.json().catch(() => null); if (!r.ok) throw new Error(d?.msg || d?.message || r.statusText); return d; });
}

// ── Tokens ──
const T = {
  bg:"#F4F3F8",card:"#FFFFFF",shadow:"0 2px 12px rgba(120,100,180,0.08)",
  border:"#EEEDF3",text:"#1E1B2E",sub:"#8E8AA0",dim:"#C5C2D0",

const DK=["일","월","화","수","목","금","토"];

  none:{label:"출근",credit:0,color:T.accent,bg:T.accentL},

  full:{label:"연차",credit:8,color:T.ok,bg:T.okL},
};

// ── Date ──
function getMon(d){const t=new Date(d);const y=t.getDay();t.setDate(t.getDate()+(y===0?-6:1-y));t.setHours(0,0,0,0);return t;}
function getWD(m){return Array.from({length:5},(_,i)=>{const d=new Date(m);d.setDate(d.getDate()+i);return d;});}
function dk(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function same(a,b){return dk(a)===dk(b);}
function fmtMD(d){return(d.getMonth()+1)+"."+d.getDate();}
function fmtR(ds){const s=ds[0],e=ds[4];return s.getFullYear()+"년 "+(s.getMonth()+1)+"월 "+s.getDate()+"일 — "+(e.getMonth()+1)+"월 "+e.getDate()+"일";}
function nowT(){const d=new Date();return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");}

// ── Calc ──
function toM(t){if(!t)return null;const[h,m]=t.split(":").map(Number);return h*60+m;}
function dec(m){return(m/60).toFixed(1);}
function calcD(ci,co,ty){
  const lv=LV[ty];
  if(ty==="full")return{actual:0,credited:lv.credit*60};
  const i=toM(ci),o=toM(co);
  if(i==null||o==null||o<=i)return{actual:0,credited:lv.credit*60};
  const a=Math.max(0,o-i-60);return{actual:a,credited:a+lv.credit*60};
}
function emptyD(){return{clockIn:"",clockOut:"",leaveType:"none"};}

// ── Ring ──
function Ring({pct,size,stroke,color,children}){
  const r=(size-stroke)/2,c=2*Math.PI*r,off=c*(1-Math.min(1,pct));
  return React.createElement("div",{style:{position:"relative",width:size,height:size}},
    React.createElement("svg",{width:size,height:size,style:{transform:"rotate(-90deg)"}},
      React.createElement("circle",{cx:size/2,cy:size/2,r,fill:"none",stroke:T.border,strokeWidth:stroke}),
      React.createElement("circle",{cx:size/2,cy:size/2,r,fill:"none",stroke:color,strokeWidth:stroke,strokeLinecap:"round",strokeDasharray:c,strokeDashoffset:off,style:{transition:"all 0.5s cubic-bezier(.4,0,.2,1)"}})
    ),
    React.createElement("div",{style:{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}},children)
  );
}

// ── DayRow ──

      React.createElement("div",{onClick:onInit,style:{width:36,height:36,borderRadius:10,background:isToday?T.accent:T.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flexShrink:0,cursor:"pointer"}},
        React.createElement("span",{style:{fontSize:13,fontWeight:700,color:isToday?"#fff":T.text,lineHeight:1}},DK[date.getDay()]),

        Object.entries(LV).map(([k,v])=>
          React.createElement("button",{key:k,onClick:()=>onChange("leaveType",k),style:{flex:1,padding:"5px 0",fontSize:10,fontWeight:data.leaveType===k?700:500,background:data.leaveType===k?v.color:"transparent",color:data.leaveType===k?"#fff":T.sub,border:"none",borderRadius:6,cursor:"pointer",transition:"all 0.15s"}},v.label)
        )
      ),
      // hours
      React.createElement("div",{style:{minWidth:44,textAlign:"center",background:filled?T.okL:isFull?T.okL:"transparent",padding:"4px 8px",borderRadius:8}},
        React.createElement("span",{style:{fontSize:15,fontWeight:800,fontFamily:"'SF Mono',monospace",color:filled?T.ok:result.credited>0?T.text:T.dim}},dec(result.credited))

        React.createElement("span",{style:labelStyle("out")},"퇴근"),
        React.createElement("input",{type:"time",value:data.clockOut||"",onChange:e=>onChange("clockOut",e.target.value),style:timeStyle})
      ),
      (data.leaveType==="half"||data.leaveType==="half_half") && React.createElement("span",{style:{fontSize:9,color:lv.color,fontWeight:600,background:lv.bg,padding:"3px 6px",borderRadius:5,whiteSpace:"nowrap"}},"+"+lv.credit+"h")
    ),
    isFull && React.createElement("div",{style:{paddingLeft:44,fontSize:12,color:T.ok,fontWeight:500}},"하루 8시간 전체 인정")

}

// ── Auth ──
function AuthScreen({onLogin}){

      const data=await res.json();
      if(!res.ok){const m=data.msg||data.error_description||data.message||"";if(m.includes("Invalid login"))throw new Error("아이디 또는 비밀번호가 틀렸습니다");if(m.includes("already registered"))throw new Error("이미 사용 중인 아이디입니다");throw new Error(m||"인증 실패");}

        React.createElement("div",null,

          un.length>0&&un.length<5&&React.createElement("span",{style:{fontSize:10,color:T.warn,marginTop:2,display:"block",paddingLeft:4}},(5-un.length)+"자 더 입력해주세요")
        ),

      )

// ── Main App ──
function App(){
  const[auth,setAuth]=useState(null);
  const[syncing,setSyncing]=useState(false);
  const[lastSaved,setLastSaved]=useState(null);
  const today=useMemo(()=>new Date(),[]);
  const[monRef,setMonRef]=useState(()=>getMon(today));
  const weekDays=useMemo(()=>getWD(monRef),[monRef]);

  const timer=useRef(null);

    const ss=s||auth;if(!ss)return;
    try{
      const f=dk(days[0]),t=dk(days[4]);
      const rows=await sbFetch("/rest/v1/work_hours?user_id=eq."+ss.userId+"&date=gte."+f+"&date=lte."+t+"&order=date",{token:ss.token});
      const map={};(rows||[]).forEach(r=>{map[r.date]=r;});
      setWeek(days.map(d=>{const r=map[dk(d)];if(!r)return emptyD();return{clockIn:r.clock_in?r.clock_in.slice(0,5):"",clockOut:r.clock_out?r.clock_out.slice(0,5):"",leaveType:r.leave_type||"none"};}));
    }catch(e){console.error("Load:",e);}
  },[auth]);

  const saveD=useCallback(async(date,data)=>{
    if(!auth)return;setSyncing(true);
    try{await sbFetch("/rest/v1/work_hours?on_conflict=user_id,date",{method:"POST",token:auth.token,body:{user_id:auth.userId,date:dk(date),clock_in:data.clockIn||null,clock_out:data.clockOut||null,leave_type:data.leaveType}});setLastSaved(new Date());}
    catch(e){console.error("Save:",e);}finally{setSyncing(false);}
  },[auth]);

  const handleLogin=useCallback(s=>{setAuth(s);loadW(getWD(getMon(today)),s);},[today,loadW]);

  const nav=useCallback(dir=>{
    const m=new Date(monRef);m.setDate(m.getDate()+dir*7);setMonRef(m);loadW(getWD(m));
  },[monRef,loadW]);

  const goToday=useCallback(()=>{const m=getMon(today);setMonRef(m);loadW(getWD(m));},[today,loadW]);

  const onChange=useCallback((idx,field,val)=>{
    setWeek(prev=>{
      const next=[...prev];const u={...next[idx],[field]:val};

  const targetLeave=useMemo(()=>{if(todayIdx<0)return null;const d=week[todayIdx];if(!d?.clockIn||d.leaveType==="full")return null;const need=540-LV[d.leaveType].credit*60;const m=toM(d.clockIn)+need;if(m>=1440||m<=0)return null;const h=Math.floor(m/60),mn=m%60;return String(h).padStart(2,"0")+":"+String(mn).padStart(2,"0");},[todayIdx,week]);

  const pct=total/2400,done=total>=2400,remain=Math.max(0,2400-total),rH=Math.floor(remain/60),rM=remain%60;

  return React.createElement("div",{style:{background:T.bg,minHeight:"100vh",padding:"20px 16px",color:T.text,maxWidth:440,margin:"0 auto"}},
    // header
    React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
      React.createElement("div",{style:{display:"flex",alignItems:"center",gap:8}},

    ),

      React.createElement("div",{style:{display:"flex",alignItems:"center",gap:16}},
        React.createElement(Ring,{pct,size:96,stroke:8,color:done?T.ok:pct>0.75?T.accent:T.warn},
          done?React.createElement(React.Fragment,null,
            React.createElement("span",{style:{fontSize:11,fontWeight:800,color:T.ok,letterSpacing:1}},"CLEAR"),
            total>2400&&React.createElement("span",{style:{fontSize:9,color:T.sub}},"+"+dec(total-2400)+"h")

          ),
          isThisW&&React.createElement("div",{style:{display:"flex",gap:6}},

            )

          React.createElement("div",{style:{display:"flex",gap:4,flexWrap:"wrap"}},

              React.createElement("div",{style:{height:"100%",width:p*100+"%",background:c,borderRadius:2,transition:"width 0.3s"}})

    // week nav
    React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 4px",marginBottom:8}},
      React.createElement("button",{onClick:()=>nav(-1),style:navBtnS},"‹"),
      React.createElement("button",{onClick:goToday,style:{background:"none",border:"none",cursor:"pointer",padding:0}},
        React.createElement("span",{style:{fontSize:12,color:T.sub,fontWeight:500}},fmtR(weekDays))
      ),
      React.createElement("button",{onClick:()=>nav(1),style:navBtnS},"›")
    ),
    // day cards
    React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:8}},
      weekDays.map((date,i)=>React.createElement(DayRow,{key:dk(date),date,data:week[i],result:results[i],isToday:same(date,today),onChange:(f,v)=>onChange(i,f,v),onInit:()=>initDay(i)}))
    ),
    // footer
    React.createElement("div",{style:{marginTop:12,padding:"10px 14px",background:T.card,borderRadius:10,border:"1px solid "+T.border}},
      React.createElement("div",{style:{display:"flex",flexWrap:"wrap",gap:"2px 16px",justifyContent:"center"}},
        ["점심 1h 자동 제외","반차 +4h","반반차 +2h","연차 = 8h"].map((t,i)=>React.createElement("span",{key:i,style:{fontSize:10,color:T.sub}},t))
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
